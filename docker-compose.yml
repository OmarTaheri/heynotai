services:
  pocketbase:
    build: ./pocketbase
    container_name: heynotai-pocketbase
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./pocketbase/pb_data:/pb_data
      # Live-mount migrations so adding new migration files in dev
      # only requires a container restart, not a full image rebuild.
      # Path is /pb_migrations (root) to match the muchobien base
      # image's expected migrations directory — same convention as
      # /pb_data and /pb_hooks. Production still uses the COPY in
      # pocketbase/Dockerfile to bake migrations into the image at
      # build time.
      - ./pocketbase/pb_migrations:/pb_migrations
    environment:
      - TZ=UTC
